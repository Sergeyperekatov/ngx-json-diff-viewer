<div *ngIf="filteredDiffTree.length === 0 && diffTree.length === 0" class="no-change">
    No change
</div>

<div *ngIf="diffTree.length > 0" class="diff-list-container">
    <!-- Diff Header -->
    <div class="diff-header">
        <div class="diff-header-item">Path</div>
        <div class="diff-header-item">Before</div>
        <div class="diff-header-item">After</div>
    </div>

    <!-- Diff List -->
    <ul class="diff-list">
        <li *ngFor="let diff of filteredDiffTree"
            class="diff-item"
            [ngClass]="diff.type"
            [style.display]="diff.visible ? 'flex' : 'none'">

            <!-- Diff Content -->
            <div class="diff-column diff-path">
                <span [innerHTML]="highlightSearch(diff.pathToKey?.join('/') || '')"></span>
            </div>
            <div class="diff-column diff-old-value">
                <span *ngIf="diff.type !== 'added'">
                    <pre [innerHTML]="highlightSearch(diff.oldValue | json)"></pre>
                </span>
                <span *ngIf="diff.type === 'added'">-</span>
            </div>
            <div class="diff-column diff-new-value">
                <span *ngIf="diff.type !== 'removed'">
                    <pre [innerHTML]="highlightSearch(diff.newValue | json)"></pre>
                </span>
                <span *ngIf="diff.type === 'removed'">-</span>
            </div>
        </li>
    </ul>
</div>
